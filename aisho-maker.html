<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ふたりの相性診断メーカー｜ご縁科学研究所</title>
<style>
  :root{ --ink:#3a313a; --paper:#ffffff; --line:#e7b9c4; --accent:#ff5773; --gold:#ffb33e; --sub:#9a8b90; }
  *{box-sizing:border-box;}
  body{ margin:0; background:linear-gradient(160deg,#fff3f6 0%,#fff8f0 55%,#fdf2ff 100%); font-family:"Hiragino Mincho ProN","Yu Mincho",serif; color:var(--ink); padding:24px 12px; line-height:1.7; }
  .wrap{max-width:560px;margin:0 auto;}
  h1.app{font-size:21px;text-align:center;letter-spacing:.08em;margin:0 0 4px;font-family:"Hiragino Kaku Gothic ProN",sans-serif;}
  p.lead{text-align:center;color:var(--sub);font-size:13px;margin:0 0 22px;font-family:"Hiragino Kaku Gothic ProN",sans-serif;}
  .panel{background:#fff;border:1px solid #f3d9e0;border-radius:10px;padding:18px;margin-bottom:22px;box-shadow:0 4px 16px rgba(255,87,115,.10);font-family:"Hiragino Kaku Gothic ProN",sans-serif;}
  label{font-size:13px;font-weight:bold;display:block;margin-bottom:6px;}
  .row{display:flex;gap:10px;}
  .row>div{flex:1;}
  input[type=text]{width:100%;padding:11px 12px;font-size:16px;border:1px solid #ecc8d2;border-radius:8px;background:#fffdfe;}
  .rels{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .rels button{font-size:14px;padding:9px 12px;border:1px solid #ccc;background:#fafafa;border-radius:999px;cursor:pointer;transition:.15s;}
  .rels button.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .go{margin-top:16px;width:100%;padding:14px;font-size:16px;font-weight:bold;color:#fff;background:var(--ink);border:none;border-radius:9px;cursor:pointer;letter-spacing:.08em;}
  .go:active{opacity:.85;}
  .hidden{display:none !important;}

  /* ===== 鑑定書カード ===== */
  .card{background:var(--paper);border:2px solid var(--line);border-radius:8px;position:relative;padding:0;box-shadow:0 8px 28px rgba(255,87,115,.14);}
  .card::before{content:"";position:absolute;inset:6px;border:1px solid var(--gold);border-radius:2px;pointer-events:none;}
  .chead{text-align:center;padding:16px 16px 8px;}
  .chead .brand{font-size:10px;letter-spacing:.3em;color:var(--gold);font-family:"Hiragino Kaku Gothic ProN",sans-serif;}
  .chead .title{font-size:20px;letter-spacing:.2em;margin-top:6px;font-weight:bold;}
  .chead .no{font-size:10px;color:var(--sub);margin-top:4px;font-family:"Courier New",monospace;letter-spacing:.1em;}
  .pair{text-align:center;padding:6px 16px 10px;font-size:17px;font-weight:bold;}
  .pair .rel{display:inline-block;font-size:11px;color:#fff;background:var(--accent);border-radius:999px;padding:2px 10px;margin:0 6px;vertical-align:middle;font-family:"Hiragino Kaku Gothic ProN",sans-serif;}
  .score{text-align:center;padding:4px 16px 2px;}
  .score .num{font-size:58px;font-weight:bold;line-height:1;color:var(--accent);font-family:"Hiragino Kaku Gothic ProN",sans-serif;}
  .score .num small{font-size:24px;}
  .score .label{font-size:14px;letter-spacing:.16em;margin-top:4px;color:var(--ink);}
  .radar{display:block;margin:6px auto 2px;}
  .axes{display:flex;flex-wrap:wrap;justify-content:center;gap:6px 14px;padding:2px 18px 12px;font-size:11px;color:var(--sub);font-family:"Hiragino Kaku Gothic ProN",sans-serif;}
  .axes span b{color:var(--ink);}
  .comment{margin:0 14px 12px;padding:12px 14px;background:#fff;border:1px dashed var(--gold);border-radius:6px;font-size:13.5px;font-family:"Hiragino Kaku Gothic ProN",sans-serif;}
  .comment h3{margin:0 0 6px;font-size:12px;letter-spacing:.1em;color:var(--accent);}
  .seal{position:absolute;top:88px;right:20px;width:52px;height:52px;border:2px solid var(--accent);color:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;font-size:10px;font-weight:bold;line-height:1.25;transform:rotate(-8deg);opacity:.92;background:rgba(255,255,255,.6);font-family:"Hiragino Kaku Gothic ProN",sans-serif;}
  .cfoot{border-top:1px solid var(--gold);margin:0 14px;padding:10px 2px 16px;font-size:10px;color:var(--sub);font-family:"Hiragino Kaku Gothic ProN",sans-serif;display:flex;justify-content:space-between;align-items:center;}
  .actions{display:flex;gap:10px;margin-top:16px;font-family:"Hiragino Kaku Gothic ProN",sans-serif;}
  .actions button{flex:1;padding:12px;font-size:14px;border:1px solid var(--ink);background:#fff;border-radius:9px;cursor:pointer;font-weight:bold;}
  .actions button.gacha{background:var(--ink);color:#fff;}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="app">ふたりの相性診断メーカー</h1>
  <p class="lead">ふたりの名前と関係を入れるだけ。AIが相性を鑑定して鑑定書を発行します。</p>

  <div class="panel">
    <div class="row">
      <div><label>① ひとり目</label><input type="text" id="a" placeholder="例：あなた" maxlength="16" autocomplete="off"></div>
      <div><label>② ふたり目</label><input type="text" id="b" placeholder="例：推し" maxlength="16" autocomplete="off"></div>
    </div>
    <label style="margin-top:16px;">③ ふたりの関係</label>
    <div class="rels" id="rels"></div>
    <button class="go" id="go">相性を鑑定する</button>
  </div>

  <div class="card hidden" id="card">
    <div class="chead">
      <div class="brand">GO-EN SCIENCE LABORATORY</div>
      <div class="title">相 性 鑑 定 書</div>
      <div class="no" id="cno">No. ____-____</div>
    </div>
    <div class="pair" id="pair">― <span class="rel">―</span> ―</div>
    <div class="score">
      <div class="num"><span id="score">--</span><small>%</small></div>
      <div class="label" id="rank">―</div>
    </div>
    <svg class="radar" id="radar" width="220" height="200" viewBox="0 0 220 200"></svg>
    <div class="axes" id="axesList"></div>
    <div class="comment">
      <h3>鑑定コメント</h3>
      <p id="comment">―</p>
    </div>
    <div class="cfoot">
      <span>発行：ご縁科学研究所</span>
      <span id="issue">鑑定方式：決定論ハッシュ v1</span>
    </div>
    <div class="seal" id="seal">ご縁<br>認定</div>
  </div>

  <div class="actions hidden" id="actions">
    <button class="gacha" id="gacha">もう一度鑑定</button>
    <button id="reset">入力をやり直す</button>
  </div>
</div>

<script>
const RELS = [["恋人","💕"],["友達","🤝"],["家族","🏠"],["推し","⭐"],["夫婦","💍"],["同僚","💼"]];
let rel = null;
const relBox = document.getElementById('rels');
RELS.forEach(([name,emo])=>{
  const btn=document.createElement('button'); btn.textContent=emo+" "+name;
  btn.onclick=()=>{ rel=name; [...relBox.children].forEach(c=>c.classList.remove('on')); btn.classList.add('on'); };
  relBox.appendChild(btn);
});

// 決定論ハッシュ（名前は順不同・関係込みで同入力＝同結果）
function hash(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}return Math.abs(h);}

const AXES = ["価値観","テンポ","会話","信頼","刺激"];
const RANKS = [[95,"運命級の超相性"],[85,"最高のベストマッチ"],[72,"かなりの好相性"],[58,"ほどよい相性"],[45,"これから育つ相性"],[0,"試練の相性（伸びしろ大）"]];

// スコア帯×関係でコメント
const CMT_HIGH = ["考えなくても波長が合う稀有なふたり。近すぎて遠慮を忘れがちなので、たまの「ありがとう」を忘れずに。",
"言わなくても伝わるレベルの一致度。ただし「察してくれる」に甘えると危険、言葉にする習慣を。",
"一緒にいるほど整っていく相性。倦怠期が来たら、初めて会った日の話をすると一気に戻ります。"];
const CMT_MID = ["違いはあるけれど、その違いがちょうど良いスパイスになるふたり。価値観の確認を定期的にどうぞ。",
"噛み合う日と噛み合わない日の差が大きめ。テンポが合わない日は無理に合わせず、少し距離を。",
"お互いの「当たり前」がズレやすいタイプ。先に期待を口に出しておくと衝突が激減します。"];
const CMT_LOW = ["最初は手探りでも、理解した瞬間に強くなる「スルメ型」の相性。焦らず時間を味方に。",
"正反対だからこそ学びが多いふたり。合わせようとせず、違いを面白がれた方が勝ちです。",
"今は伸びしろの塊。小さな「ありがとう」と「ごめん」の数が、そのまま相性の伸び率になります。"];
const REL_TIP = {
  "恋人":"恋人なら、月イチで『最近うれしかったこと』を交換するのが効きます。",
  "友達":"友達なら、用がなくても送る一言が関係を長持ちさせます。",
  "家族":"家族なら、近いからこそ敬語ひとつの感謝が効きます。",
  "推し":"推しとは一方通行でも、推す側の人生が確実に潤う健全な相性です。",
  "夫婦":"夫婦なら、家事の分担より「実況中継（ありがとうの言語化）」が効きます。",
  "同僚":"同僚なら、仕事の外で一度だけ雑談すると驚くほど回り出します。"
};

let lastExtra=0;
function pickRank(s){ for(const [t,l] of RANKS){ if(s>=t) return l; } return "―"; }

function drawRadar(scores){
  const svg=document.getElementById('radar'); svg.innerHTML="";
  const cx=110, cy=100, R=72, N=5;
  const NS="http://www.w3.org/2000/svg";
  const pt=(i,r)=>{ const ang=-Math.PI/2 + i*2*Math.PI/N; return [cx+r*Math.cos(ang), cy+r*Math.sin(ang)]; };
  // グリッド
  for(let g=1;g<=4;g++){
    const poly=document.createElementNS(NS,"polygon");
    let pts=[]; for(let i=0;i<N;i++){const[x,y]=pt(i,R*g/4);pts.push(x.toFixed(1)+","+y.toFixed(1));}
    poly.setAttribute("points",pts.join(" "));
    poly.setAttribute("fill","none"); poly.setAttribute("stroke","#f2d6dd"); poly.setAttribute("stroke-width","1");
    svg.appendChild(poly);
  }
  // 軸線＋ラベル
  for(let i=0;i<N;i++){
    const[x,y]=pt(i,R);
    const line=document.createElementNS(NS,"line");
    line.setAttribute("x1",cx);line.setAttribute("y1",cy);line.setAttribute("x2",x);line.setAttribute("y2",y);
    line.setAttribute("stroke","#f2d6dd");line.setAttribute("stroke-width","1");
    svg.appendChild(line);
    const[lx,ly]=pt(i,R+14);
    const t=document.createElementNS(NS,"text");
    t.setAttribute("x",lx);t.setAttribute("y",ly+3);t.setAttribute("text-anchor","middle");
    t.setAttribute("font-size","10");t.setAttribute("fill","#9a8b90");
    t.setAttribute("font-family","'Hiragino Kaku Gothic ProN',sans-serif");
    t.textContent=AXES[i]; svg.appendChild(t);
  }
  // データポリゴン
  const poly=document.createElementNS(NS,"polygon");
  let pts=[]; for(let i=0;i<N;i++){const[x,y]=pt(i,R*scores[i]/100);pts.push(x.toFixed(1)+","+y.toFixed(1));}
  poly.setAttribute("points",pts.join(" "));
  poly.setAttribute("fill","rgba(255,87,115,.20)"); poly.setAttribute("stroke","#ff5773"); poly.setAttribute("stroke-width","2");
  svg.appendChild(poly);
  for(let i=0;i<N;i++){const[x,y]=pt(i,R*scores[i]/100);const c=document.createElementNS(NS,"circle");c.setAttribute("cx",x);c.setAttribute("cy",y);c.setAttribute("r","2.5");c.setAttribute("fill","#ff5773");svg.appendChild(c);}
}

function render(extra){
  const a=(document.getElementById('a').value.trim()||"ひとり目");
  const b=(document.getElementById('b').value.trim()||"ふたり目");
  // 順不同：ソートして結合
  const key=[a,b].sort().join("×")+"@"+rel;
  const base=hash(key);
  const seed=base+extra*2654435761;
  lastExtra=extra;
  const s=Math.abs(seed);
  // 5軸スコア（45〜99）
  const scores=AXES.map((_,i)=> 45 + (hash(key+"_"+i+"_"+extra) % 55));
  // 相性％（軸平均にゆらぎ）
  const avg=scores.reduce((p,c)=>p+c,0)/scores.length;
  const score=Math.max(38, Math.min(99, Math.round(avg + ((s%21)-10))));
  document.getElementById('pair').innerHTML = `${a} <span class="rel">${rel}</span> ${b}`;
  document.getElementById('score').textContent = score;
  document.getElementById('rank').textContent = pickRank(score);
  document.getElementById('cno').textContent = "No. "+(1000+base%9000)+"-"+(10+ (s%90));
  drawRadar(scores);
  document.getElementById('axesList').innerHTML = AXES.map((ax,i)=>`<span><b>${ax}</b> ${scores[i]}</span>`).join("");
  const band = score>=78 ? CMT_HIGH : score>=56 ? CMT_MID : CMT_LOW;
  const cmt = band[(s>>3)%band.length] + (REL_TIP[rel]? " "+REL_TIP[rel] : "");
  document.getElementById('comment').textContent = cmt;
  document.getElementById('card').classList.remove('hidden');
  document.getElementById('actions').classList.remove('hidden');
}

document.getElementById('go').onclick=()=>{
  if(!document.getElementById('a').value.trim() || !document.getElementById('b').value.trim()){ alert("ふたりの名前を入れてください"); return; }
  if(!rel){ alert("ふたりの関係を選んでください"); return; }
  render(0);
  document.getElementById('card').scrollIntoView({behavior:'smooth'});
};
document.getElementById('gacha').onclick=()=> render(lastExtra+1);
document.getElementById('reset').onclick=()=>{
  document.getElementById('card').classList.add('hidden');
  document.getElementById('actions').classList.add('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
};
</script>
</body>
</html>
