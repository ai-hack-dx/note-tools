<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF テキスト＆画像追加ツール｜無料ブラウザツール</title>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
    background: #f0f4f8;
    color: #1e293b;
    min-height: 100vh;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 28px 16px 60px; }

  .header { text-align: center; margin-bottom: 28px; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #dbeafe; color: #1d4ed8;
    font-size: 12px; font-weight: 600;
    padding: 4px 12px; border-radius: 20px; margin-bottom: 14px;
  }
  .header h1 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
  .header p { color: #64748b; font-size: 13px; }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed #94a3b8; border-radius: 20px;
    padding: 60px 24px; text-align: center; cursor: pointer;
    transition: all 0.2s; background: white; max-width: 560px; margin: 0 auto;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #2563eb; background: #eff6ff; }
  .drop-zone .dz-icon { font-size: 52px; margin-bottom: 16px; }
  .drop-zone h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .drop-zone p { color: #64748b; font-size: 14px; }
  .drop-zone input { display: none; }

  /* Main layout */
  .main-layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 18px;
    align-items: start;
  }
  @media (max-width: 720px) { .main-layout { grid-template-columns: 1fr; } }

  /* Left panel */
  .card { background: white; border-radius: 18px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

  .tabs { display: flex; gap: 4px; background: #f1f5f9; border-radius: 10px; padding: 4px; margin-bottom: 18px; }
  .tab {
    flex: 1; padding: 8px 6px; border: none; background: none; border-radius: 7px;
    cursor: pointer; font-size: 12px; font-weight: 600; color: #64748b;
    transition: all 0.15s; font-family: inherit;
  }
  .tab.active { background: white; color: #2563eb; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 11px; font-weight: 700; color: #475569; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
  input[type="text"], textarea, select, input[type="number"] {
    width: 100%; padding: 9px 11px; border: 1.5px solid #e2e8f0; border-radius: 9px;
    font-size: 13px; color: #1e293b; background: #f8fafc;
    font-family: inherit; transition: border-color 0.15s; line-height: 1.5;
  }
  input:focus, textarea:focus, select:focus {
    outline: none; border-color: #2563eb; background: white; box-shadow: 0 0 0 3px #dbeafe;
  }
  textarea { resize: vertical; min-height: 72px; }

  .color-row { display: flex; gap: 8px; align-items: center; }
  .color-row input[type="color"] {
    width: 40px; height: 38px; padding: 2px 3px;
    border: 1.5px solid #e2e8f0; border-radius: 8px; cursor: pointer; flex-shrink: 0;
  }
  .color-row input[type="text"] { flex: 1; }

  .img-upload {
    border: 2px dashed #e2e8f0; border-radius: 10px; padding: 20px;
    text-align: center; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  }
  .img-upload:hover { border-color: #93c5fd; background: #f0f9ff; }
  .img-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .img-upload .iu-icon { font-size: 26px; margin-bottom: 6px; }
  .img-upload p { font-size: 12px; color: #64748b; }
  #imgPreview { width: 100%; max-height: 100px; object-fit: contain; border-radius: 7px; border: 1px solid #e2e8f0; margin-top: 4px; }

  .btn-add {
    width: 100%; padding: 11px; background: #2563eb; color: white;
    border: none; border-radius: 11px; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: background 0.15s; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 2px;
  }
  .btn-add:hover { background: #1d4ed8; }

  /* Element list */
  .list-header { display: flex; align-items: center; justify-content: space-between; margin: 18px 0 10px; }
  .list-title { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.04em; }
  .list-count {
    background: #2563eb; color: white; font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 20px; min-width: 22px; text-align: center;
  }
  .list-count.zero { background: #e2e8f0; color: #94a3b8; }
  .element-list { display: flex; flex-direction: column; gap: 7px; }
  .el-item {
    background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 9px;
    padding: 9px 11px; display: flex; align-items: center; gap: 8px;
  }
  .el-item .el-icon { font-size: 15px; flex-shrink: 0; }
  .el-item .el-info { flex: 1; min-width: 0; }
  .el-item .el-title { font-size: 12px; font-weight: 600; color: #334155; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .el-item .el-meta { font-size: 10px; color: #94a3b8; margin-top: 1px; }
  .el-item .el-del { background: none; border: none; color: #fca5a5; cursor: pointer; font-size: 16px; flex-shrink: 0; padding: 0; line-height: 1; }
  .el-item .el-del:hover { color: #ef4444; }
  .empty-list { text-align: center; padding: 24px 12px; color: #94a3b8; font-size: 12px; line-height: 1.7; }

  /* Preview area */
  .preview-wrap { background: white; border-radius: 18px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

  .preview-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; gap: 10px; flex-wrap: wrap;
  }
  .page-nav { display: flex; align-items: center; gap: 10px; }
  .page-nav button {
    background: #f1f5f9; border: none; border-radius: 8px; padding: 6px 12px;
    cursor: pointer; font-size: 14px; font-weight: 600; color: #475569; transition: background 0.15s;
  }
  .page-nav button:hover:not(:disabled) { background: #dbeafe; color: #2563eb; }
  .page-nav button:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-nav span { font-size: 13px; font-weight: 600; color: #475569; white-space: nowrap; }

  .hint-bar {
    background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 10px;
    padding: 8px 14px; font-size: 12px; color: #1d4ed8;
  }

  .canvas-container {
    position: relative; display: inline-block;
    width: 100%; overflow: auto;
    border: 1px solid #e2e8f0; border-radius: 10px;
    background: #f8fafc;
  }
  #pdfCanvas { display: block; max-width: 100%; height: auto; }

  /* Overlay container */
  #overlay {
    position: absolute; inset: 0; pointer-events: none;
  }

  /* Draggable items on canvas */
  .drag-item {
    position: absolute;
    pointer-events: all;
    cursor: grab;
    user-select: none;
    background: rgba(37, 99, 235, 0.15);
    border: 2px solid #2563eb;
    border-radius: 6px;
    padding: 3px 7px;
    font-size: 12px;
    font-weight: 600;
    color: #1e3a8a;
    white-space: nowrap;
    max-width: 240px;
    overflow: hidden;
    text-overflow: ellipsis;
    transform: translate(-50%, -50%);
    box-shadow: 0 2px 8px rgba(37,99,235,0.25);
    transition: box-shadow 0.1s;
  }
  .drag-item:active { cursor: grabbing; box-shadow: 0 4px 14px rgba(37,99,235,0.4); }
  .drag-item.img-item { background: rgba(5,150,105,0.12); border-color: #059669; color: #064e3b; }
  .drag-item .del-btn {
    display: inline-block; margin-left: 6px; cursor: pointer;
    color: #ef4444; font-weight: 700; font-size: 13px;
    vertical-align: middle; line-height: 1;
  }
  .drag-item .del-btn:hover { color: #b91c1c; }

  /* Save */
  .save-row { margin-top: 16px; }
  .btn-save {
    width: 100%; padding: 15px; background: #059669; color: white;
    border: none; border-radius: 14px; font-size: 15px; font-weight: 800;
    cursor: pointer; transition: background 0.15s; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-save:hover { background: #047857; }
  .btn-save:disabled { background: #94a3b8; cursor: not-allowed; }
  .privacy { text-align: center; margin-top: 10px; font-size: 11px; color: #94a3b8; }

  /* Toast */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: #1e293b; color: white; padding: 11px 22px;
    border-radius: 12px; font-size: 13px; font-weight: 600;
    z-index: 9999; pointer-events: none; white-space: nowrap;
    animation: fadeUp 0.2s ease forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="badge">🔒 ブラウザ内処理・完全無料・サーバー送信なし</div>
    <h1>PDF テキスト＆画像追加ツール</h1>
    <p>PDFを開いて、テキストや画像をドラッグで好きな場所に置いて保存できます</p>
  </div>

  <!-- Drop zone -->
  <div id="dropZone" class="drop-zone">
    <div class="dz-icon">📄</div>
    <h2>PDFをドラッグ＆ドロップ</h2>
    <p>またはクリックしてファイルを選択</p>
    <input type="file" id="fileInput" accept=".pdf">
  </div>

  <!-- Main: left panel + preview -->
  <div id="mainLayout" class="main-layout hidden">

    <!-- Left panel -->
    <div>
      <div class="card">
        <div class="tabs">
          <button class="tab active" id="tabText" onclick="switchTab('text')">📝 テキスト</button>
          <button class="tab" id="tabImage" onclick="switchTab('image')">🖼 画像</button>
        </div>

        <!-- Text form -->
        <div id="textForm">
          <div class="form-group">
            <label>テキスト内容</label>
            <textarea id="textContent" placeholder="追加したいテキスト&#10;（日本語・複数行OK）"></textarea>
          </div>
          <div class="form-group">
            <label>フォントサイズ</label>
            <select id="fontSize">
              <option value="10">10pt</option>
              <option value="12">12pt</option>
              <option value="14" selected>14pt</option>
              <option value="18">18pt</option>
              <option value="24">24pt</option>
              <option value="36">36pt</option>
              <option value="48">48pt</option>
            </select>
          </div>
          <div class="form-group">
            <label>文字色</label>
            <div class="color-row">
              <input type="color" id="textColorPicker" value="#000000"
                oninput="document.getElementById('textColorHex').value=this.value">
              <input type="text" id="textColorHex" value="#000000" placeholder="#000000"
                oninput="if(/^#[0-9a-fA-F]{6}$/.test(this.value))document.getElementById('textColorPicker').value=this.value">
            </div>
          </div>
          <button class="btn-add" onclick="addText()">＋ プレビューに追加して位置を決める</button>
        </div>

        <!-- Image form -->
        <div id="imageForm" class="hidden">
          <div class="form-group">
            <label>画像ファイル（JPG / PNG）</label>
            <div class="img-upload">
              <input type="file" id="imgFileInput" accept="image/jpeg,image/png" onchange="onImgSelect(this)">
              <div id="imgPlaceholder">
                <div class="iu-icon">🖼</div>
                <p>クリックして画像を選択</p>
              </div>
              <img id="imgPreview" class="hidden" alt="プレビュー">
            </div>
          </div>
          <div class="form-group">
            <label>表示幅（pt）</label>
            <input type="number" id="imgWidth" value="200" min="10" max="1000">
          </div>
          <button class="btn-add" onclick="addImage()">＋ プレビューに追加して位置を決める</button>
        </div>

        <!-- Element list -->
        <div class="list-header">
          <span class="list-title">追加した要素</span>
          <span class="list-count zero" id="listCount">0</span>
        </div>
        <div class="element-list" id="elementList">
          <div class="empty-list">テキストや画像を追加すると<br>ここに一覧が表示されます</div>
        </div>
      </div>
    </div>

    <!-- Preview + Save -->
    <div class="preview-wrap">
      <div class="preview-toolbar">
        <div class="page-nav">
          <button id="btnPrev" onclick="changePage(-1)" disabled>◀</button>
          <span id="pageLabel">1 / 1</span>
          <button id="btnNext" onclick="changePage(1)" disabled>▶</button>
          <button onclick="resetFile()" style="margin-left:8px; font-size:12px;">別のPDFを開く</button>
        </div>
        <div class="hint-bar">💡 追加した要素をドラッグして位置を調整できます</div>
      </div>

      <div class="canvas-container" id="canvasContainer">
        <canvas id="pdfCanvas"></canvas>
        <div id="overlay"></div>
      </div>

      <div class="save-row">
        <button id="saveBtn" class="btn-save" onclick="savePDF()">
          📥 このまま PDF を保存する
        </button>
        <div class="privacy">🔒 ファイルはどこにも送信されません。すべてブラウザ内で処理します</div>
      </div>
    </div>

  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const { PDFDocument } = PDFLib;

let pdfBytes = null;
let pdfJsDoc = null;
let pageCount = 0;
let currentPage = 1;
let canvasScale = 1;
let elements = [];
let imgData = null;
let imgType = null;

/* ─── File loading ─── */
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') loadPDF(f);
  else toast('PDFファイルを選択してください');
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadPDF(e.target.files[0]); });

async function loadPDF(file) {
  try {
    pdfBytes = await file.arrayBuffer();
    const copy = pdfBytes.slice(0);
    pdfJsDoc = await pdfjsLib.getDocument({ data: copy }).promise;
    pageCount = pdfJsDoc.numPages;
    currentPage = 1;
    document.getElementById('dropZone').classList.add('hidden');
    document.getElementById('mainLayout').classList.remove('hidden');
    await renderPage(currentPage);
    updatePageNav();
  } catch(e) {
    toast('PDFの読み込みに失敗しました（パスワード付きPDFは非対応です）');
  }
}

function resetFile() {
  pdfBytes = null; pdfJsDoc = null; pageCount = 0; currentPage = 1;
  elements = []; imgData = null;
  fileInput.value = '';
  document.getElementById('overlay').innerHTML = '';
  document.getElementById('dropZone').classList.remove('hidden');
  document.getElementById('mainLayout').classList.add('hidden');
  document.getElementById('imgFileInput').value = '';
  document.getElementById('imgPreview').classList.add('hidden');
  document.getElementById('imgPlaceholder').classList.remove('hidden');
  renderList();
}

/* ─── PDF.js page rendering ─── */
async function renderPage(pageNum) {
  const page = await pdfJsDoc.getPage(pageNum);
  const container = document.getElementById('canvasContainer');
  const containerWidth = container.clientWidth || 700;
  const unscaled = page.getViewport({ scale: 1 });
  canvasScale = (containerWidth - 2) / unscaled.width;
  const vp = page.getViewport({ scale: canvasScale });
  const canvas = document.getElementById('pdfCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = vp.width;
  canvas.height = vp.height;
  await page.render({ canvasContext: ctx, viewport: vp }).promise;

  // Overlay matches canvas size
  const overlay = document.getElementById('overlay');
  overlay.style.width = canvas.width + 'px';
  overlay.style.height = canvas.height + 'px';
  renderOverlay();
}

function updatePageNav() {
  document.getElementById('pageLabel').textContent = `${currentPage} / ${pageCount}`;
  document.getElementById('btnPrev').disabled = currentPage <= 1;
  document.getElementById('btnNext').disabled = currentPage >= pageCount;
}

async function changePage(delta) {
  const next = currentPage + delta;
  if (next < 1 || next > pageCount) return;
  currentPage = next;
  await renderPage(currentPage);
  updatePageNav();
}

/* ─── Overlay: render draggable items for currentPage ─── */
function renderOverlay() {
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = '';
  const canvas = document.getElementById('pdfCanvas');

  elements.filter(el => el.page === currentPage).forEach(el => {
    const div = document.createElement('div');
    div.className = 'drag-item' + (el.type === 'image' ? ' img-item' : '');
    div.style.left = (el.xRatio * canvas.width) + 'px';
    div.style.top = (el.yRatio * canvas.height) + 'px';

    const label = el.type === 'text'
      ? el.text.replace(/\n/g, ' ').slice(0, 30) + (el.text.length > 30 ? '…' : '')
      : '🖼 画像';
    div.innerHTML = label + `<span class="del-btn" data-id="${el.id}" title="削除">✕</span>`;

    makeDraggable(div, el);

    div.querySelector('.del-btn').addEventListener('click', e => {
      e.stopPropagation();
      removeEl(el.id);
    });

    overlay.appendChild(div);
  });
}

function makeDraggable(div, el) {
  let startX, startY, startLeft, startTop;
  const canvas = document.getElementById('pdfCanvas');

  div.addEventListener('mousedown', e => {
    if (e.target.classList.contains('del-btn')) return;
    e.preventDefault();
    startX = e.clientX;
    startY = e.clientY;
    startLeft = parseFloat(div.style.left);
    startTop  = parseFloat(div.style.top);

    const onMove = e => {
      const nx = startLeft + (e.clientX - startX);
      const ny = startTop  + (e.clientY - startY);
      const clamped_x = Math.max(0, Math.min(canvas.width,  nx));
      const clamped_y = Math.max(0, Math.min(canvas.height, ny));
      div.style.left = clamped_x + 'px';
      div.style.top  = clamped_y + 'px';
      el.xRatio = clamped_x / canvas.width;
      el.yRatio = clamped_y / canvas.height;
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // Touch support
  div.addEventListener('touchstart', e => {
    if (e.target.classList.contains('del-btn')) return;
    e.preventDefault();
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    startLeft = parseFloat(div.style.left);
    startTop  = parseFloat(div.style.top);

    const onMove = e => {
      const t = e.touches[0];
      const nx = startLeft + (t.clientX - startX);
      const ny = startTop  + (t.clientY - startY);
      const cx = Math.max(0, Math.min(canvas.width,  nx));
      const cy = Math.max(0, Math.min(canvas.height, ny));
      div.style.left = cx + 'px';
      div.style.top  = cy + 'px';
      el.xRatio = cx / canvas.width;
      el.yRatio = cy / canvas.height;
    };
    const onEnd = () => {
      div.removeEventListener('touchmove', onMove);
      div.removeEventListener('touchend', onEnd);
    };
    div.addEventListener('touchmove', onMove, { passive: false });
    div.addEventListener('touchend', onEnd);
  }, { passive: false });
}

/* ─── Tab switching ─── */
function switchTab(t) {
  document.getElementById('tabText').classList.toggle('active', t === 'text');
  document.getElementById('tabImage').classList.toggle('active', t === 'image');
  document.getElementById('textForm').classList.toggle('hidden', t !== 'text');
  document.getElementById('imageForm').classList.toggle('hidden', t !== 'image');
}

/* ─── Add text ─── */
function addText() {
  if (!pdfJsDoc) { toast('先にPDFを開いてください'); return; }
  const text = document.getElementById('textContent').value.trim();
  if (!text) { toast('テキストを入力してください'); return; }

  elements.push({
    id: Date.now(), type: 'text', text,
    fontSize: parseInt(document.getElementById('fontSize').value),
    color: document.getElementById('textColorHex').value || '#000000',
    page: currentPage,
    xRatio: 0.5, yRatio: 0.5
  });
  document.getElementById('textContent').value = '';
  renderList();
  renderOverlay();
  toast('追加しました。プレビュー上でドラッグして位置を調整してください ✓');
}

/* ─── Image select ─── */
function onImgSelect(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    imgData = e.target.result;
    imgType = file.type === 'image/jpeg' ? 'jpg' : 'png';
    document.getElementById('imgPlaceholder').classList.add('hidden');
    const prev = document.getElementById('imgPreview');
    prev.src = imgData;
    prev.classList.remove('hidden');
  };
  reader.readAsDataURL(file);
}

/* ─── Add image ─── */
function addImage() {
  if (!pdfJsDoc) { toast('先にPDFを開いてください'); return; }
  if (!imgData) { toast('画像を選択してください'); return; }

  elements.push({
    id: Date.now(), type: 'image',
    dataUrl: imgData, imgType,
    width: Math.max(10, parseInt(document.getElementById('imgWidth').value) || 200),
    page: currentPage,
    xRatio: 0.5, yRatio: 0.5
  });
  imgData = null;
  document.getElementById('imgFileInput').value = '';
  document.getElementById('imgPreview').classList.add('hidden');
  document.getElementById('imgPlaceholder').classList.remove('hidden');
  renderList();
  renderOverlay();
  toast('追加しました。プレビュー上でドラッグして位置を調整してください ✓');
}

/* ─── Element list ─── */
function renderList() {
  const cnt = document.getElementById('listCount');
  cnt.textContent = elements.length;
  cnt.className = 'list-count' + (elements.length === 0 ? ' zero' : '');

  const list = document.getElementById('elementList');
  if (elements.length === 0) {
    list.innerHTML = '<div class="empty-list">テキストや画像を追加すると<br>ここに一覧が表示されます</div>';
    return;
  }
  list.innerHTML = elements.map(el => `
    <div class="el-item">
      <div class="el-icon">${el.type === 'text' ? '📝' : '🖼'}</div>
      <div class="el-info">
        <div class="el-title">${escHtml(el.type === 'text' ? el.text.replace(/\n/g,' ').slice(0,28) : '画像')}</div>
        <div class="el-meta">p.${el.page}</div>
      </div>
      <button class="el-del" onclick="removeEl(${el.id})" title="削除">×</button>
    </div>
  `).join('');
}

function removeEl(id) {
  elements = elements.filter(e => e.id !== id);
  renderList();
  renderOverlay();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ─── Japanese text → PNG (for pdf-lib) ─── */
function renderTextToPng(text, fontSize, color) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const fontStr = `${fontSize}px -apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif`;
  ctx.font = fontStr;
  const lines = text.split('\n');
  const lh = fontSize * 1.55;
  const maxW = Math.max(...lines.map(l => ctx.measureText(l).width));
  canvas.width  = Math.ceil(maxW) + 24;
  canvas.height = Math.ceil(lines.length * lh) + 16;
  ctx.font = fontStr;
  ctx.fillStyle = color;
  lines.forEach((line, i) => ctx.fillText(line, 12, fontSize + i * lh + 4));
  return { dataUrl: canvas.toDataURL('image/png'), w: canvas.width, h: canvas.height };
}

/* ─── Save PDF ─── */
async function savePDF() {
  if (!pdfBytes) return;
  if (elements.length === 0) { toast('追加する要素がありません'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 処理中...';

  try {
    // Get actual PDF page sizes via pdf-lib
    const doc = await PDFDocument.load(pdfBytes);

    for (const el of elements) {
      const pi = el.page - 1;
      if (pi < 0 || pi >= doc.getPageCount()) continue;
      const page = doc.getPage(pi);
      const { width: pW, height: pH } = page.getSize();

      if (el.type === 'text') {
        const { dataUrl, w: natW, h: natH } = renderTextToPng(el.text, el.fontSize, el.color);
        const scale = Math.min(1, (pW - 40) / natW);
        const dW = natW * scale, dH = natH * scale;
        const base64 = dataUrl.split(',')[1];
        const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
        const img = await doc.embedPng(bytes);
        // xRatio/yRatio: 0=left/top, 1=right/bottom (screen coords)
        // PDF: origin = bottom-left
        const x = el.xRatio * pW - dW / 2;
        const y = (1 - el.yRatio) * pH - dH / 2;
        page.drawImage(img, {
          x: Math.max(0, Math.min(pW - dW, x)),
          y: Math.max(0, Math.min(pH - dH, y)),
          width: dW, height: dH
        });

      } else {
        const base64 = el.dataUrl.split(',')[1];
        const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
        const img = el.imgType === 'jpg' ? await doc.embedJpg(bytes) : await doc.embedPng(bytes);
        const { width: natW, height: natH } = img.size();
        const dW = Math.min(el.width, pW - 40);
        const dH = (natH / natW) * dW;
        const x = el.xRatio * pW - dW / 2;
        const y = (1 - el.yRatio) * pH - dH / 2;
        page.drawImage(img, {
          x: Math.max(0, Math.min(pW - dW, x)),
          y: Math.max(0, Math.min(pH - dH, y)),
          width: dW, height: dH
        });
      }
    }

    const saved = await doc.save();
    const url = URL.createObjectURL(new Blob([saved], { type: 'application/pdf' }));
    const a = document.createElement('a');
    a.href = url; a.download = 'edited.pdf'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    toast('PDFを保存しました ✓');

  } catch(e) {
    console.error(e);
    toast('エラーが発生しました。別のPDFをお試しください。');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '📥 このまま PDF を保存する';
  }
}

/* ─── Helpers ─── */
function toast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
</script>
