.form-group { margin-bottom: 4px; }

.opt {

    compat: '相性の良い人間タイプ：<span>「一緒にまったり過ごすことに幸せを感じる、のんびり屋さん」</span>',
  },
  {
    id: 'genius',
    name: '隠れ天才',
    humanNames: { dog: '天才 わんたろう', cat: '黒木 けんじ', rabbit: '月白 さとし', bird: '空知 ひろ', other: '不思議 みらい' },
    jobs: { dog: '🔬 研究者（人に言わないが論文が多数）', cat: '💻 フリーランスエンジニア（高収入）', rabbit: '📊 データアナリスト', bird: '🎓 大学院生（奨学金全額免除）', other: '🧩 謎解きクリエイター' },
    quote: '「それはね、……（3秒沈黙）……まあいいか。」',
    traits: [
      { e: '🔍', title: '観察力が人間レベルを超えている', desc: '何かを凝視しているとき、確実に何かを分析している。何を見ているかは不明。' },
      { e: '🗝️', title: '学習能力が異常に高い', desc: '一度覚えたことは絶対忘れない。特にごはんの時間と場所は完璧に記憶。' },
      { e: '😏', title: '意外と感情的', desc: '普段は冷静に見えるが、急にテンション上がる。その落差が人間っぽい。' },
    ],
    compat: '相性の良い人間タイプ：<span>「知的好奇心が旺盛で、相手のことをちゃんと観察できる人」</span>',
  },
];

/* ─── Build questions ─── */
const answers = new Array(Qs.length).fill(null);

function buildQuestions() {
  const container = document.getElementById('questions');
  container.innerHTML = Qs.map((q, qi) => `
    <div class="q-block">
      <div class="q-label">
        <span class="q-num">Q${qi + 1}</span>
        ${q.text}
      </div>
      <div class="options">
        ${q.opts.map((o, oi) => `
          <label class="opt" id="opt_${qi}_${oi}">
            <input type="radio" name="q${qi}" value="${oi}" onchange="selectOpt(${qi}, ${oi})">
            <span class="emo">${o.e}</span>
            <span class="opt-text">${o.t}</span>
          </label>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function selectOpt(qi, oi) {
  // Clear previous selection for this question
  Qs[qi].opts.forEach((_, i) => {
    document.getElementById(`opt_${qi}_${i}`)?.classList.remove('selected');
  });
  document.getElementById(`opt_${qi}_${oi}`)?.classList.add('selected');
  answers[qi] = Qs[qi].opts[oi].v;
}

/* ─── Photo upload ─── */
document.getElementById('photoInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const prev = document.getElementById('photoPreview');
    prev.src = ev.target.result;
    prev.classList.remove('hidden');
    document.getElementById('photoPlaceholder').classList.add('hidden');
  };
  reader.readAsDataURL(file);
});

/* ─── Diagnose ─── */
function diagnose() {
  const unanswered = answers.findIndex(a => a === null);
  if (unanswered !== -1) {
    const el = document.getElementById('questions').querySelectorAll('.q-block')[unanswered];
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.outline = '2px solid #d97706';
    el.style.borderRadius = '12px';
    setTimeout(() => el.style.outline = '', 1500);
    return;
  }

  const petName = document.getElementById('petName').value.trim() || 'うちの子';
  const petType = document.getElementById('petType').value;

  // Score calculation
  const total = answers.reduce((s, v) => s + v, 0);
  const social = answers[0] + answers[2] + answers[4] + answers[6]; // 社交性
  const energy = answers[3] + answers[5] + answers[9];              // 活発度
  const attach = answers[7] + answers[8];                           // 依存度

  let typeIdx;
  if (social >= 6 && energy >= 3) typeIdx = 3;       // 熱血スポーツマン
  else if (social >= 6 && attach >= 3) typeIdx = 0;  // 天然アイドル
  else if (social >= 5 && energy >= 2) typeIdx = 1;  // 頼れる部長
  else if (energy <= 1 && social <= 2) typeIdx = 2;  // 孤高の芸術家
  else if (attach <= 2 && energy <= 2) typeIdx = 4;  // ほのぼの主婦
  else if (total >= 13) typeIdx = 5;                 // 隠れ天才
  else typeIdx = Math.floor(total / 4) % TYPES.length;

  const type = TYPES[typeIdx];
  const humanName = type.humanNames[petType] || type.humanNames.other;
  const job = type.jobs[petType] || type.jobs.other;

  // Photo
  const photoSrc = document.getElementById('photoPreview').src;
  const rcPhotoWrap = document.getElementById('rcPhotoWrap');
  if (photoSrc && !document.getElementById('photoPreview').classList.contains('hidden')) {
    rcPhotoWrap.innerHTML = `<img src="${photoSrc}" alt="${petName}">`;
  } else {
    const emoMap = { dog: '🐶', cat: '🐱', rabbit: '🐰', bird: '🐦', other: '🐾' };
    rcPhotoWrap.innerHTML = `<span class="rc-emoji">${emoMap[petType]}</span>`;
  }

  // Fill result
  document.getElementById('rcPetName').textContent = petName;
  document.getElementById('rcType').textContent = `タイプ：${type.name}`;
  document.getElementById('rcHumanName').textContent = humanName;
  document.getElementById('rcJob').textContent = job;
  document.getElementById('rcQuote').textContent = type.quote;
  document.getElementById('rcCompat').innerHTML = type.compat;

  document.getElementById('rcTraits').innerHTML = type.traits.map(t => `
    <div class="rc-trait">
      <span class="t-icon">${t.e}</span>
      <span class="t-text"><strong>${t.title}</strong><br>${t.desc}</span>
    </div>
  `).join('');

  // Switch view
  document.getElementById('formSection').classList.add('hidden');
  document.getElementById('resultSection').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Store for share
  window._shareData = { petName, humanName, typeName: type.name, job };
}

function retry() {
  answers.fill(null);
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
  document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
  document.getElementById('formSection').classList.remove('hidden');
  document.getElementById('resultSection').classList.add('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function shareX() {
  const d = window._shareData || {};
  const text = `うちの子「${d.petName}」を擬人化したら…\n\n「${d.humanName}」（${d.typeName}）でした！\n職業：${d.job}\n\n▼無料で診断してみる\nhttps://ai-hack-dx.github.io/note-tools/pet-maker.html\n\n#ペット擬人化 #うちの子自慢`;
  window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
}

/* ─── Init ─── */
buildQuestions();
</script>
